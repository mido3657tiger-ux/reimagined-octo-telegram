<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية TigerX | NovaDev</title>
    <style>
        :root { --main: #ff4d05; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; text-align: center; }
        header { padding: 100px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1000&q=80'); background-size: cover; border-bottom: 4px solid var(--main); }
        .tiger-logo { font-size: 4rem; color: var(--main); text-shadow: 0 0 20px var(--main); }
        .btn { display: inline-block; padding: 15px 40px; background: var(--main); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 15px rgba(255, 77, 5, 0.4); }
        .status-box { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 40px auto; max-width: 500px; border: 1px solid #333; }
        .online { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="tiger-logo">🐯 TigerX</div>
        <h1>مرحباً بك في لوحة تحكم إمبراطورية تايجر</h1>
        <p>Full-Stack Developer | CyberSecurity | Automation Expert</p>
        <a href="https://t.me/TigerX_Empire_Bot" class="btn">دخول البوت الخاص</a>
    </header>

    <div class="status-box">
        <h3>حالة النظام الحالي 🚀</h3>
        <p>الموقع: <span class="online">شغال (Live)</span></p>
        <p>السيرفر: <span class="online">مستقر على بورت 3000</span></p>
        <hr style="border-color: #333">
        <p>مشروع NovaDev قيد التطوير المستمر</p>
    </div>
</body>
